name: Release

on:
  workflow_dispatch:
  push:
    tags:
      # 兼容 v1.0、v1.0.0、v1.0.0-beta.1 等发版标签（原先仅 v*.*.* 会漏掉两段式版本）
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm ci

      - name: Build package
        run: npm run package

      - name: Read version
        id: pkg
        shell: bash
        run: |
          VERSION="$(node -p 'require("./package.json").version')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify artifact
        shell: bash
        run: |
          test -f "build/arxiv-md-v${{ steps.pkg.outputs.version }}.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "build/arxiv-md-v${{ steps.pkg.outputs.version }}.zip" \
            --generate-notes \
            --title "${{ github.ref_name }}"
