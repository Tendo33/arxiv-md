name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm ci

      - name: Build package
        run: npm run package

      - name: Read version
        id: pkg
        shell: bash
        run: |
          echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Verify artifact
        shell: bash
        run: |
          test -f "build/arxiv-md-v${{ steps.pkg.outputs.version }}.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "build/arxiv-md-v${{ steps.pkg.outputs.version }}.zip" \
            --generate-notes \
            --title "${{ github.ref_name }}"
