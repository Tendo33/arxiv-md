<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon Generator - arXiv to Markdown</title>
    <style>
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: #0f172a;
        color: #f1f5f9;
        margin: 0;
      }
      .container {
        background: #1e293b;
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
        text-align: center;
        max-width: 600px;
        width: 90%;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      h1 {
        font-weight: 800;
        margin-bottom: 8px;
        background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      p {
        color: #94a3b8;
        margin-bottom: 32px;
      }
      .controls {
        background: rgba(15, 23, 42, 0.5);
        padding: 20px;
        border-radius: 16px;
        margin-bottom: 32px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        text-align: left;
      }
      .control-group {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .control-group label {
        flex: 1;
        font-size: 14px;
        font-weight: 500;
        color: #cbd5e1;
      }
      input[type="range"] {
        flex: 2;
        cursor: pointer;
      }
      .radius-value {
        min-width: 40px;
        text-align: right;
        font-family: monospace;
        color: #818cf8;
      }
      canvas {
        background: #000;
        border: 2px solid #334155;
        border-radius: 4px;
        transition: transform 0.2s;
      }
      canvas:hover {
        transform: scale(1.05);
      }
      .btn {
        background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        color: white;
        border: none;
        padding: 12px 28px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
        font-size: 16px;
        transition: all 0.2s;
        box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
      }
      .btn:active {
        transform: translateY(0);
      }
      .preview-row {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        gap: 24px;
        margin: 32px 0;
        padding: 20px;
        background: rgba(15, 23, 42, 0.3);
        border-radius: 16px;
      }
      .label {
        font-size: 12px;
        color: #94a3b8;
        margin-top: 8px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Icon Generator</h1>
      <p>Configure icon corner radius and download assets.</p>
      
      <div class="controls">
        <div class="control-group">
          <label for="radius-slider">Corner Radius (滑块调节圆角)</label>
          <input type="range" id="radius-slider" min="0" max="50" value="20">
          <span class="radius-value" id="radius-text">20%</span>
        </div>
      </div>

      <div class="preview-row">
        <div>
          <canvas id="canvas128" width="128" height="128"></canvas>
          <div class="label">128x128</div>
        </div>
        <div>
          <canvas id="canvas48" width="48" height="48"></canvas>
          <div class="label">48x48</div>
        </div>
        <div>
          <canvas id="canvas16" width="16" height="16"></canvas>
          <div class="label">16x16</div>
        </div>
      </div>

      <button class="btn" onclick="downloadAll()">Download All Assets</button>
    </div>

    <script>
      let sourceImage = null;
        let radiusPercent = 20;

      function loadSourceImage() {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => {
            sourceImage = img;
            resolve(img);
          };
          img.onerror = reject;
          img.src = "../assets/icon.svg";
        });
      }

        function drawIcons() {
          const sizes = [128, 48, 16];
          sizes.forEach((size) => {
            const canvas = document.getElementById(`canvas${size}`);
            const ctx = canvas.getContext("2d");
            drawIconFromImage(ctx, size);
          });
        }

      function drawIconFromImage(ctx, size) {
        if (!sourceImage) return;

        ctx.clearRect(0, 0, size, size);
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";

        const radius = (size * radiusPercent) / 100;

        ctx.save();
        ctx.beginPath();
        if (ctx.roundRect) {
          ctx.roundRect(0, 0, size, size, radius);
        } else {
          ctx.moveTo(radius, 0);
          ctx.lineTo(size - radius, 0);
          ctx.quadraticCurveTo(size, 0, size, radius);
          ctx.lineTo(size, size - radius);
          ctx.quadraticCurveTo(size, size, size - radius, size);
          ctx.lineTo(radius, size);
          ctx.quadraticCurveTo(0, size, 0, size - radius);
          ctx.lineTo(0, radius);
          ctx.quadraticCurveTo(0, 0, radius, 0);
          ctx.closePath();
        }
        ctx.clip();

        ctx.drawImage(sourceImage, 0, 0, size, size);
        ctx.restore();
      }

      async function init() {
        const slider = document.getElementById("radius-slider");
        const radiusText = document.getElementById("radius-text");

        slider.oninput = (e) => {
          radiusPercent = e.target.value;
          radiusText.textContent = `${radiusPercent}%`;
          drawIcons();
        };

        try {
          await loadSourceImage();
          drawIcons();
        } catch (error) {
          alert("无法加载 icon.svg，请确保文件位于 ../assets/icon.svg");
          console.error(error);
        }
      }

      function downloadAll() {
        const sizes = [128, 48, 16];
        sizes.forEach((size) => {
          const canvas = document.getElementById(`canvas${size}`);
          const link = document.createElement("a");
          link.download = `icon-${size}.png`;
          link.href = canvas.toDataURL("image/png");
          link.click();
        });
      }

      window.onload = init;
    </script>
  </body>
</html>
